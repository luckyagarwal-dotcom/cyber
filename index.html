<!DOCTYPE html>
<html>

<head>

    <title>Image Viewer</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="popup-overlay" id="consentPopup">

    <div class="popup-box">

        <h3>Age Verification Required</h3>

        <p>
            Are you 18+?
        </p>

        <button id="allowCamera">
            Continue
        </button>

    </div>

</div>



<header>

    <div class="logo">
        imgview
    </div>


    <div class="menu">

        <a href="#">
            About
        </a>

        <a href="#">
            Sign In
        </a>

    </div>

</header>




<main>

    <h2>
        Shared Image
    </h2>


    <div class="image-box">

        <img src="images/photo.jpeg" alt="Shared Image">

    </div>


</main>



<script src="script.js"></script>


</body>

</html>
